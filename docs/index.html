<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwAN — Swift Advanced Navigation</title>
  <meta name="description" content="Type-safe multi-stack navigation for SwiftUI Development" />
  <!-- Docsify built-in theme (includes default search panel styling) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <!-- Public binary release docs: lighter sky-blue accent -->
  <style>
    :root {
      --docs-accent: #38bdf8;
      --docs-accent-muted: #0ea5e9;
      --docs-accent-soft: #e0f2fe;
      --app-bg: #f0f9ff;
      --app-surface: #ffffff;
      --app-text: #1e293b;
      --docs-border-muted: #bae6fd;
    }

    body {
      background: var(--app-bg);
      color: var(--app-text);
    }

    .sidebar {
      background: var(--app-surface);
    }

    .app-name-link:hover {
      color: var(--docs-accent-muted);
    }

    .sidebar-nav li.active > a,
    .sidebar-nav ul > li.active > a {
      color: var(--docs-accent-muted) !important;
      font-weight: 600;
      border-left-color: var(--docs-accent-muted) !important;
    }

    .sidebar-nav ul > li > a:hover,
    .sidebar-nav li > a:hover {
      color: var(--docs-accent-muted) !important;
    }

    .sidebar-nav h2 {
      margin: 1.35rem 0 0.5rem;
      padding: 0.65rem 1rem 0.35rem;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      border-top: 1px solid var(--docs-border-muted);
    }

    .sidebar-nav h2:first-of-type {
      margin-top: 0.75rem;
    }

    .markdown-section {
      color: var(--app-text);
    }

    .markdown-section a {
      color: var(--docs-accent-muted);
    }

    .markdown-section a:hover {
      color: var(--docs-accent);
    }

    .markdown-section .anchor span {
      color: var(--docs-accent-muted);
    }

    .markdown-section h1 .anchor span,
    .markdown-section h2 .anchor span,
    .markdown-section h3 .anchor span,
    .markdown-section h4 .anchor span {
      color: var(--docs-accent-muted);
    }

    .pagination-nav a:hover .pagination-nav-title {
      color: var(--docs-accent-muted);
    }

    .version-select {
      margin: 0.75rem 1rem 0.5rem;
      padding: 0.35rem 0.5rem;
      width: calc(100% - 2rem);
      font-size: 13px;
      border: 1px solid var(--docs-border-muted);
      border-radius: 4px;
      background: #fff;
      box-sizing: border-box;
    }

    .version-select:focus {
      outline: none;
      border-color: var(--docs-accent-muted);
      box-shadow: 0 0 0 2px var(--docs-accent-soft);
    }

    .sidebar .search input:focus {
      outline: none;
      box-shadow: inset 0 0 0 1px var(--docs-accent-muted);
    }

    .sidebar .search .matching-post {
      border-color: var(--docs-accent-soft);
    }

    .sidebar .search .matching-post:hover {
      border-color: var(--docs-accent-muted);
    }

    .sidebar .search .clear-button {
      opacity: 0.55;
    }

    .sidebar .search .clear-button:hover {
      opacity: 1;
      color: var(--docs-accent-muted);
    }

    /* section.cover {
      background: linear-gradient(165deg, var(--docs-accent-soft) 0%, var(--app-bg) 45%, #fff 100%);
      color: var(--app-text);
      background-attachment: fixed;
    } */

    section.cover .cover-main > p:last-child a {
      border-radius: 2rem;
      padding: 0.5rem 1.25rem;
      margin-right: 0.5rem;
      border: 2px solid var(--docs-accent-muted);
      color: var(--docs-accent-muted);
      background: #fff;
    }

    section.cover .cover-main > p:last-child a:hover {
      background: var(--docs-accent-muted);
      color: #fff;
    }

    .github-corner svg {
      fill: var(--docs-accent-muted);
    }

    .sidebar-toggle {
      background-color: transparent;
    }

    .sidebar-toggle span {
      background: var(--docs-accent-muted);
    }

    .markdown-section blockquote {
      border-left: 4px solid var(--docs-accent-soft);
      color: #475569;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    function resolveLatest(hash) {
      return fetch('versions.json')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var latest = data.latest || 'v0.3.1';
          if (hash && hash.indexOf('#/latest') === 0) {
            window.location.hash = hash.replace('#/latest', '#/' + latest);
          }
          return latest;
        })
        .catch(function () { return 'v0.3.1'; });
    }

    if (window.location.hash.indexOf('#/latest') === 0) {
      resolveLatest(window.location.hash);
    }

    function getCurrentVersion() {
      var hash = window.location.hash || '';
      var match = hash.match(/#\/(v[\d.]+)\//);
      return match ? match[1] : null;
    }

    window.$docsify = {
      name: 'SwAN',
      repo: 'https://github.com/Namalabs/SwAN',
      themeColor: '#0ea5e9',
      // GitHub Pages project site lives under /SwAN/; local `docsify serve` uses /
      basePath: (function () {
        var h = window.location.hostname;
        if (!h || h === 'localhost' || h === '127.0.0.1') return '/';
        return '/SwAN/';
      })(),
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      coverpage: '_coverpage.md',
      onlyCover: false,
      search: 'auto',
      alias: {
        '/latest/(.*)': '/v0.3.1/$1',
        '/latest': '/v0.3.1/',
        '/v0.3.1/.*/_sidebar.md': '/v0.3.1/_sidebar.md',
        '/v0.3.0/.*/_sidebar.md': '/v0.3.0/_sidebar.md',
        '/v0.2.0/.*/_sidebar.md': '/v0.2.0/_sidebar.md',
        '/v0.1.0/.*/_sidebar.md': '/v0.1.0/_sidebar.md',
      },

      plugins: [
        function (hook) {
          var versionSelect = null;

          hook.mounted(function () {
            fetch('versions.json')
              .then(function (res) { return res.json(); })
              .then(function (data) {
                var sidebar = document.querySelector('.sidebar-nav');
                if (!sidebar) return;
                var currentVersion = getCurrentVersion();

                var select = document.createElement('select');
                select.className = 'version-select';
                select.setAttribute('aria-label', 'Documentation version');

                var placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = 'Select version';
                placeholder.disabled = true;
                placeholder.selected = !currentVersion;
                select.appendChild(placeholder);

                data.versions.forEach(function (v) {
                  var opt = document.createElement('option');
                  opt.value = v;
                  opt.textContent = v + (v === data.latest ? ' (latest)' : '');
                  if (v === currentVersion) {
                    opt.selected = true;
                  }
                  select.appendChild(opt);
                });

                select.addEventListener('change', function () {
                  if (!select.value) return;
                  window.location.hash = '#/' + select.value + '/';
                });

                sidebar.parentNode.insertBefore(select, sidebar);
                versionSelect = select;
              });
          });

          hook.beforeEach(function (content) {
            if (window.location.hash.indexOf('#/latest') === 0) {
              resolveLatest(window.location.hash);
            }
            if (versionSelect) {
              var v = getCurrentVersion();
              versionSelect.value = v || '';
            }
            return content;
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-swift.min.js"></script>
</body>
</html>
